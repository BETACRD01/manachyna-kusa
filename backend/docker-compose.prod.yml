version: '3.8'

services:
  web:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    expose:
      - 8000
    env_file: .env
    depends_on:
      - db
      - redis

  daphne:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    command: daphne -b 0.0.0.0 -p 9001 config.asgi:application
    expose:
      - 9001
    env_file: .env
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static
      - ./media:/app/media
    ports:
      - "80:80"
    depends_on:
      - web
      - daphne

  celery:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A config worker --loglevel=info
    env_file: .env
    depends_on:
      - db
      - redis

  # DB and Redis images would typically be managed by the platform in prod (RDS, Elasticache)
  # but here we include them for a full self-contained stack
  db:
    image: postgis/postgis:15-3.3
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    env_file: .env

  redis:
    image: redis:7-alpine

volumes:
  postgres_data_prod:
